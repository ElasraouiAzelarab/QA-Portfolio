<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Portfolio — Calculator Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-wrapper">
    <header class="site-header">
      <h1>QA Portfolio</h1>
      <p class="subtitle">Demo application — Calculator</p>
    </header>

    <main class="calculator-container" role="main">
      <section class="calculator" aria-label="Calculator">
        <div class="display" id="display" role="status" aria-live="polite" aria-label="Calculator display">
          <span class="expression" id="expression"></span>
          <span class="current-value" id="current-value">0</span>
        </div>

        <div class="keypad" role="group" aria-label="Calculator keypad">
          <!-- Row 1 -->
          <button class="btn btn-clear btn-wide" data-action="clear" aria-label="Clear all">AC</button>
          <button class="btn btn-clear" data-action="sign" aria-label="Toggle sign">+/−</button>
          <button class="btn btn-clear" data-action="percent" aria-label="Percent">%</button>
          <button class="btn btn-operator" data-action="divide" aria-label="Divide">÷</button>

          <!-- Row 2 -->
          <button class="btn" data-digit="7" aria-label="7">7</button>
          <button class="btn" data-digit="8" aria-label="8">8</button>
          <button class="btn" data-digit="9" aria-label="9">9</button>
          <button class="btn btn-operator" data-action="multiply" aria-label="Multiply">×</button>

          <!-- Row 3 -->
          <button class="btn" data-digit="4" aria-label="4">4</button>
          <button class="btn" data-digit="5" aria-label="5">5</button>
          <button class="btn" data-digit="6" aria-label="6">6</button>
          <button class="btn btn-operator" data-action="subtract" aria-label="Subtract">−</button>

          <!-- Row 4 -->
          <button class="btn" data-digit="1" aria-label="1">1</button>
          <button class="btn" data-digit="2" aria-label="2">2</button>
          <button class="btn" data-digit="3" aria-label="3">3</button>
          <button class="btn btn-operator" data-action="add" aria-label="Add">+</button>

          <!-- Row 5 -->
          <button class="btn btn-wide" data-digit="0" aria-label="0">0</button>
          <button class="btn" data-action="decimal" aria-label="Decimal point">.</button>
          <button class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>
        </div>
      </section>

      <section class="history-panel" aria-label="Calculation history">
        <h2>History</h2>
        <ul id="history-list" aria-label="Calculation history list">
          <li class="history-empty">No calculations yet.</li>
        </ul>
        <button class="btn-clear-history" id="clear-history" aria-label="Clear history">Clear History</button>
      </section>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      // ──────────────────────────────────────────
      // State
      // ──────────────────────────────────────────
      let currentValue = '0';
      let previousValue = '';
      let operator = null;
      let shouldResetDisplay = false;
      const MAX_DIGITS = 12;

      // ──────────────────────────────────────────
      // DOM references
      // ──────────────────────────────────────────
      const displayEl = document.getElementById('current-value');
      const expressionEl = document.getElementById('expression');
      const historyList = document.getElementById('history-list');
      const clearHistoryBtn = document.getElementById('clear-history');

      // ──────────────────────────────────────────
      // Display helpers
      // ──────────────────────────────────────────
      function updateDisplay(value) {
        displayEl.textContent = formatNumber(value);
      }

      function formatNumber(value) {
        const num = parseFloat(value);
        if (isNaN(num)) return value;
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-6 && num !== 0)) {
          return num.toExponential(4);
        }
        const str = String(value);
        if (str.includes('.')) return str;
        return num.toLocaleString('en-US');
      }

      // ──────────────────────────────────────────
      // Core logic
      // ──────────────────────────────────────────
      function calculate(a, op, b) {
        const numA = parseFloat(a);
        const numB = parseFloat(b);
        switch (op) {
          case 'add':      return numA + numB;
          case 'subtract': return numA - numB;
          case 'multiply': return numA * numB;
          case 'divide':
            if (numB === 0) { showError('Error: ÷0'); return null; }
            return numA / numB;
          default: return numB;
        }
      }

      function showError(msg) {
        displayEl.textContent = msg;
        displayEl.classList.add('error');
        currentValue = '0';
        previousValue = '';
        operator = null;
        shouldResetDisplay = true;
        setTimeout(() => displayEl.classList.remove('error'), 1500);
      }

      function appendToHistory(expression, result) {
        const emptyMsg = historyList.querySelector('.history-empty');
        if (emptyMsg) emptyMsg.remove();

        const li = document.createElement('li');
        li.className = 'history-item';
        li.setAttribute('role', 'listitem');
        li.innerHTML = `<span class="hist-expr">${expression}</span>
                        <span class="hist-result">= ${formatNumber(String(result))}</span>`;
        historyList.prepend(li);
      }

      // ──────────────────────────────────────────
      // Button handlers
      // ──────────────────────────────────────────
      function handleDigit(digit) {
        if (shouldResetDisplay) {
          currentValue = digit === '.' ? '0.' : digit;
          shouldResetDisplay = false;
        } else {
          if (digit === '.' && currentValue.includes('.')) return;
          if (currentValue === '0' && digit !== '.') {
            currentValue = digit;
          } else {
            if (currentValue.replace('-', '').replace('.', '').length >= MAX_DIGITS) return;
            currentValue += digit;
          }
        }
        updateDisplay(currentValue);
      }

      function handleOperator(op) {
        if (operator && !shouldResetDisplay) {
          const result = calculate(previousValue, operator, currentValue);
          if (result === null) return;
          currentValue = String(result);
          updateDisplay(currentValue);
        }
        previousValue = currentValue;
        operator = op;
        shouldResetDisplay = true;

        const symbols = { add: '+', subtract: '−', multiply: '×', divide: '÷' };
        expressionEl.textContent = `${formatNumber(previousValue)} ${symbols[op]}`;
      }

      function handleEquals() {
        if (!operator || !previousValue) return;
        const result = calculate(previousValue, operator, currentValue);
        if (result === null) return;

        const symbols = { add: '+', subtract: '−', multiply: '×', divide: '÷' };
        const expression = `${formatNumber(previousValue)} ${symbols[operator]} ${formatNumber(currentValue)}`;
        appendToHistory(expression, result);

        expressionEl.textContent = '';
        currentValue = String(result);
        updateDisplay(currentValue);
        operator = null;
        previousValue = '';
        shouldResetDisplay = true;
      }

      function handleClear() {
        currentValue = '0';
        previousValue = '';
        operator = null;
        shouldResetDisplay = false;
        expressionEl.textContent = '';
        displayEl.classList.remove('error');
        updateDisplay('0');
      }

      function handleSign() {
        if (currentValue === '0') return;
        currentValue = String(parseFloat(currentValue) * -1);
        updateDisplay(currentValue);
      }

      function handlePercent() {
        currentValue = String(parseFloat(currentValue) / 100);
        updateDisplay(currentValue);
      }

      // ──────────────────────────────────────────
      // Event delegation
      // ──────────────────────────────────────────
      document.querySelector('.keypad').addEventListener('click', function (e) {
        const btn = e.target.closest('button');
        if (!btn) return;

        const digit = btn.dataset.digit;
        const action = btn.dataset.action;

        if (digit !== undefined) {
          handleDigit(digit);
        } else if (action) {
          switch (action) {
            case 'clear':    handleClear();    break;
            case 'sign':     handleSign();     break;
            case 'percent':  handlePercent();  break;
            case 'decimal':  handleDigit('.');  break;
            case 'equals':   handleEquals();   break;
            default:         handleOperator(action); break;
          }
        }
      });

      clearHistoryBtn.addEventListener('click', function () {
        historyList.innerHTML = '<li class="history-empty">No calculations yet.</li>';
      });

      // Keyboard support
      document.addEventListener('keydown', function (e) {
        if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
        else if (e.key === '.') handleDigit('.');
        else if (e.key === '+') handleOperator('add');
        else if (e.key === '-') handleOperator('subtract');
        else if (e.key === '*') handleOperator('multiply');
        else if (e.key === '/') { e.preventDefault(); handleOperator('divide'); }
        else if (e.key === 'Enter' || e.key === '=') handleEquals();
        else if (e.key === 'Escape') handleClear();
        else if (e.key === 'Backspace') {
          if (currentValue.length > 1) {
            currentValue = currentValue.slice(0, -1);
          } else {
            currentValue = '0';
          }
          updateDisplay(currentValue);
        }
      });

      // Initial render
      updateDisplay('0');
    })();
  </script>
</body>
</html>
